<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Malaria Detection</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 860px; margin: 40px auto; padding: 0 16px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .col { flex: 1; min-width: 260px; }
    img { max-width: 100%; border: 1px solid #eee; border-radius: 8px; }
    .btn { padding: 10px 14px; border: 0; border-radius: 8px; cursor: pointer; background: #111; color: #fff; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .muted { color: #666; font-size: 0.95rem; }
    .result { margin-top: 12px; padding: 12px; border-radius: 8px; background: #f7f7f7; }
    code { background: #f2f2f2; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Malaria Detection with CNN</h1>
  <p class="muted">
    Upload a single cell image. This is <b>educational only</b> and not a diagnostic tool.
  </p>

  <div class="card">
    <div class="row">
      <div class="col">
        <h3>Upload image</h3>
        <input id="file" type="file" accept="image/*" />
        <div style="margin-top:12px;">
          <button id="btn" class="btn" disabled>Predict</button>
        </div>
        <p class="muted">Endpoint: <code>POST /predict</code></p>

        <div id="out" class="result" style="display:none;"></div>
      </div>

      <div class="col">
        <h3>Preview</h3>
        <img id="preview" alt="preview will appear here" />
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("file");
    const btn = document.getElementById("btn");
    const preview = document.getElementById("preview");
    const out = document.getElementById("out");

    let selectedFile = null;

    fileInput.addEventListener("change", () => {
      const f = fileInput.files && fileInput.files[0];
      selectedFile = f || null;
      btn.disabled = !selectedFile;

      out.style.display = "none";
      out.textContent = "";

      if (selectedFile) {
        preview.src = URL.createObjectURL(selectedFile);
      } else {
        preview.removeAttribute("src");
      }
    });

    btn.addEventListener("click", async () => {
      if (!selectedFile) return;

      btn.disabled = true;
      out.style.display = "block";
      out.textContent = "Predicting...";

      const form = new FormData();
      form.append("file", selectedFile);

      try {
        const res = await fetch("/predict", { method: "POST", body: form });
        const data = await res.json();

        if (!res.ok) {
          out.textContent = "Error: " + (data.detail || res.statusText);
        } else {
          const p = data.probability_parasitized;
          out.innerHTML =
            "<div><b>Label:</b> " + data.label + "</div>" +
            "<div><b>P(Parasitized):</b> " + Number(p).toFixed(4) + "</div>" +
            "<div class='muted' style='margin-top:8px;'>" + data.disclaimer + "</div>";
        }
      } catch (e) {
        out.textContent = "Request failed: " + e;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
