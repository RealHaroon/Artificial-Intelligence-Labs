<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>House Price Predictor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        .container {
            width: 420px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 6px 0 14px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            padding: 12px;
            background: #e8f5e9;
            border-left: 5px solid #4caf50;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>House Price Predictor</h2>

    <form action="/predict" method="post">

        <label>Overall Quality (1–10)</label>
        <input type="number" name="OverallQual" required>

        <label>Ground Living Area (sq ft)</label>
        <input type="number" name="GrLivArea" required>

        <label>Garage Cars</label>
        <input type="number" name="GarageCars" required>

        <label>Total Basement Area (sq ft)</label>
        <input type="number" name="TotalBsmtSF" required>

        <label>Year Built</label>
        <input type="number" name="YearBuilt" required>

        <button type="submit">Predict Price</button>
    </form>

    {% if prediction %}
        <div class="result">
            Estimated House Price: <br>
            <strong>${{ prediction }}</strong>
        </div>
    {% endif %}
</div>

</body>
</html>
