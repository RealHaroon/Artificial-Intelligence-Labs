<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iris Species Classifier</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0b1220; color: #e8eefc; margin: 0; }
    .wrap { max-width: 820px; margin: 40px auto; padding: 24px; }
    .card { background: #121a2b; border: 1px solid #22304f; border-radius: 12px; padding: 20px; }
    h1 { margin-top: 0; font-size: 22px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { font-size: 13px; opacity: 0.9; }
    input {
      width: 100%; padding: 10px 12px; border-radius: 10px;
      border: 1px solid #2a3b63; background: #0d1526; color: #e8eefc;
      outline: none;
    }
    button {
      margin-top: 14px; width: 100%; padding: 12px;
      border: 0; border-radius: 10px; cursor: pointer;
      background: #4f7cff; color: white; font-weight: 600;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    pre {
      white-space: pre-wrap; word-wrap: break-word;
      background: #0d1526; border: 1px solid #2a3b63;
      padding: 12px; border-radius: 10px; margin-top: 14px;
    }
    .hint { font-size: 13px; opacity: 0.85; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Iris Flower Classifier</h1>
      <div class="hint">Enter 4 measurements and click Predict.</div>

      <div class="grid" style="margin-top:14px;">
        <div>
          <label>Sepal length</label>
          <input id="sepal_length" type="number" step="0.01" value="5.1"/>
        </div>
        <div>
          <label>Sepal width</label>
          <input id="sepal_width" type="number" step="0.01" value="3.5"/>
        </div>
        <div>
          <label>Petal length</label>
          <input id="petal_length" type="number" step="0.01" value="1.4"/>
        </div>
        <div>
          <label>Petal width</label>
          <input id="petal_width" type="number" step="0.01" value="0.2"/>
        </div>
      </div>

      <button id="btn" onclick="doPredict()">Predict</button>
      <pre id="out">Output will appear here...</pre>
    </div>
  </div>

  <script>
    async function doPredict() {
      const btn = document.getElementById("btn");
      const out = document.getElementById("out");

      const payload = {
        sepal_length: parseFloat(document.getElementById("sepal_length").value),
        sepal_width: parseFloat(document.getElementById("sepal_width").value),
        petal_length: parseFloat(document.getElementById("petal_length").value),
        petal_width: parseFloat(document.getElementById("petal_width").value)
      };

      btn.disabled = true;
      out.textContent = "Predicting...";

      try {
        const res = await fetch("/predict", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        out.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        out.textContent = "Error: " + err;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
