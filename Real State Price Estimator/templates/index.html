<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Price Estimator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { margin-top: 50px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #result { font-weight: bold; color: #28a745; font-size: 1.5rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <h2 class="text-center mb-4">🏠 House Price Estimator</h2>
                <form id="predictForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Median Income ($10k units)</label>
                            <input type="number" step="0.01" class="form-control" name="median_income" value="8.32" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">House Age</label>
                            <input type="number" class="form-control" name="house_age" value="41" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Avg Rooms</label>
                            <input type="number" step="0.01" class="form-control" name="avg_rooms" value="6.98" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Avg Bedrooms</label>
                            <input type="number" step="0.01" class="form-control" name="avg_bedrooms" value="1.02" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Population</label>
                            <input type="number" class="form-control" name="population" value="322" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Avg Occupancy</label>
                            <input type="number" step="0.01" class="form-control" name="avg_occupancy" value="2.55" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Latitude</label>
                            <input type="number" step="0.01" class="form-control" name="latitude" value="37.88" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Longitude</label>
                            <input type="number" step="0.01" class="form-control" name="longitude" value="-122.23" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-4">Estimate Price</button>
                </form>
                <div class="mt-4 text-center">
                    <p id="result"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('predictForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        const response = await fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();
        document.getElementById('result').innerText = "Estimated Price: " + result.price;
    });
</script>

</body>
</html>
