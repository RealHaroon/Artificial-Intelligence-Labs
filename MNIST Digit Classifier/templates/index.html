<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MNIST Digit Classifier</title>
  <style>
    body { font-family: system-ui, Arial; max-width: 900px; margin: 24px auto; }
    #board { border: 2px solid #222; touch-action: none; }
    .row { display: flex; gap: 24px; align-items: flex-start; }
    button { padding: 10px 14px; margin-right: 10px; cursor: pointer; }
    pre { background: #f6f6f6; padding: 12px; overflow: auto; }
  </style>
</head>
<body>
  <h2>MNIST Digit Classifier (FastAPI + Keras)</h2>

  <div class="row">
    <div>
      <canvas id="board" width="280" height="280"></canvas>
      <div style="margin-top:12px;">
        <button id="btnPredict">Predict</button>
        <button id="btnClear">Clear</button>
      </div>
    </div>

    <div style="flex:1;">
      <h3>Result</h3>
      <div id="result">Draw a digit and click Predict.</div>
      <h3>Probabilities</h3>
      <pre id="probs">{}</pre>
    </div>
  </div>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const resultEl = document.getElementById("result");
const probsEl = document.getElementById("probs");
const btnPredict = document.getElementById("btnPredict");
const btnClear = document.getElementById("btnClear");

function resetCanvas() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}
resetCanvas();

ctx.lineWidth = 22;
ctx.lineCap = "round";
ctx.strokeStyle = "white";

let drawing = false;

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width);
  const y = (e.clientY - rect.top) * (canvas.height / rect.height);
  return {x, y};
}

canvas.addEventListener("pointerdown", (e) => {
  drawing = true;
  const {x, y} = getPos(e);
  ctx.beginPath();
  ctx.moveTo(x, y);
});

canvas.addEventListener("pointermove", (e) => {
  if (!drawing) return;
  const {x, y} = getPos(e);
  ctx.lineTo(x, y);
  ctx.stroke();
});

function stopDrawing() { drawing = false; }
canvas.addEventListener("pointerup", stopDrawing);
canvas.addEventListener("pointerleave", stopDrawing);

btnClear.addEventListener("click", () => {
  resetCanvas();
  resultEl.textContent = "Cleared.";
  probsEl.textContent = "{}";
});

btnPredict.addEventListener("click", async () => {
  try {
    resultEl.textContent = "Predicting...";
    probsEl.textContent = "{}";

    const dataURL = canvas.toDataURL("image/png");

    const res = await fetch("/predict", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ image: dataURL })
    });

    // Handle 400 "No digit drawn" (or any non-2xx)
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      resultEl.textContent = err.detail || `Request failed (${res.status})`;
      return;
    }

    const out = await res.json();
    resultEl.textContent = `Prediction: ${out.prediction} (confidence: ${Number(out.confidence).toFixed(4)})`;
    probsEl.textContent = JSON.stringify(out.probs, null, 2);
  } catch (e) {
    resultEl.textContent = "Network/error: " + (e?.message || e);
  }
});
</script>
</body>
</html>
